<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>닻과 파도의 항해일지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="screen">
    <div id="main-paper" class="paper-container">
      
      <div id="start-section" class="content-section">
        <h1 class="tt-title">닻과 파도의 항해일지</h1>
        <p class="sub-title">- 2000일간의 항해를 기념하며 -</p>
        <div class="input-group">
          <input type="text" id="nickname-input" class="custom-input" placeholder="호칭을 입력하세요">
        </div>
        <button id="start-btn" class="custom-btn">항해 시작하기</button>
      </div>

      <div id="game-section" class="content-section hidden">
        <div class="header-group">
          <h2 id="chapter-title" class="tt-title text-sm"></h2>
          <button id="hint-btn" class="icon-btn">📝</button>
        </div>
        
        <div class="text-area-wrapper">
          <div id="text-box" class="typing-text"></div>
        </div>
        
        <button id="next-text-btn" class="bounce-btn">▼</button>
      </div>

    </div>
  </div>

  <div id="custom-modal-overlay">
    <div id="modal-paper" class="paper-container modal-size">
      <button id="modal-close-btn" class="icon-btn close-btn">✖</button>
      <div id="modal-content">
        </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
